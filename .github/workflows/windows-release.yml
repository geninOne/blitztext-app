name: Windows Build & Release

# Builds the Windows app (Tauri v2, in BlitztextWin/).
# - On pull requests (touching the Windows app or shared/) and pushes to main:
#   build and upload the installers as a downloadable run artifact.
# - On a push to main: additionally publish a rolling prerelease (tag
#   win-v0.1.<run>) so there is always a current downloadable build.
# - On a version tag (v*): attach the Windows installers to the GitHub Release
#   (shared with the macOS build for the same tag).

on:
  pull_request:
    paths:
      - 'BlitztextWin/**'
      - 'shared/**'
      - '.github/workflows/windows-release.yml'
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    name: Build Windows app
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: write   # required to publish a Release on tag/main pushes
    defaults:
      run:
        working-directory: BlitztextWin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: BlitztextWin/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: BlitztextWin/src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app (Release)
        run: npm run tauri build

      # Gather the NSIS + MSI installers into a single folder at the repo root
      # (artifact/release paths are relative to the workspace, not this job's
      # working-directory).
      - name: Collect installers
        shell: bash
        run: |
          mkdir -p "$GITHUB_WORKSPACE/dist-installers"
          cp src-tauri/target/release/bundle/nsis/*-setup.exe "$GITHUB_WORKSPACE/dist-installers/" 2>/dev/null || true
          cp src-tauri/target/release/bundle/msi/*.msi "$GITHUB_WORKSPACE/dist-installers/" 2>/dev/null || true
          ls -lh "$GITHUB_WORKSPACE/dist-installers"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Blitztext-windows
          path: dist-installers/*
          if-no-files-found: error

      # One combined prerelease per commit: same SHA-derived tag as the macOS
      # job, so both apps' artifacts land on a single release. Whichever job
      # runs first creates it; the other just uploads its installers.
      - name: Publish prerelease (push to main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        working-directory: ${{ github.workspace }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="main-${GITHUB_SHA:0:7}"
          gh release create "$TAG" \
            dist-installers/* \
            --title "Blitztext main build (${GITHUB_SHA:0:7})" \
            --prerelease \
            --target "$GITHUB_SHA" \
            --notes "Automatic build from main (commit ${GITHUB_SHA:0:7}). Windows: unsigned NSIS/MSI — SmartScreen may warn on first launch. macOS: universal, ad-hoc signed (not notarized)." \
          || gh release upload "$TAG" dist-installers/* --clobber

      # Version tag (e.g. v1.0.0): attach the Windows installers to the release.
      # The macOS job may have created the release already, so fall back to
      # uploading into the existing release.
      - name: Publish release (version tag)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        working-directory: ${{ github.workspace }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist-installers/* \
            --title "Blitztext $GITHUB_REF_NAME" \
            --notes "Windows installers (NSIS .exe / MSI), unsigned. SmartScreen may warn on first launch." \
          || gh release upload "$GITHUB_REF_NAME" dist-installers/* --clobber
