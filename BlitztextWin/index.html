<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blitztext</title>
    <script type="module" src="/src/main.ts" defer></script>
    <style>
      .settings { max-width: 440px; margin: 0 auto; text-align: left; }
      .settings label { display: block; margin: 12px 0 4px; font-size: 13px; font-weight: 600; }
      .settings input, .settings select { width: 100%; box-sizing: border-box; padding: 8px; border-radius: 6px; }
      .subtitle { opacity: 0.7; margin-top: 0; }
      .status { margin-left: 8px; opacity: 0.8; font-size: 12px; font-weight: 400; }
      .actions { margin-top: 18px; display: flex; align-items: center; gap: 4px; }
    </style>
  </head>

  <body>
    <main class="container">
      <h1>Blitztext</h1>
      <p class="subtitle">Einstellungen</p>

      <form id="settings-form" class="settings">
        <label for="provider">Anbieter</label>
        <select id="provider">
          <option value="liteLLM">LiteLLM Gateway</option>
          <option value="openAI">OpenAI</option>
        </select>

        <div id="litellm-fields">
          <label for="baseURL">Gateway-URL (ohne /v1)</label>
          <input id="baseURL" placeholder="http://ai-gateway.intra.evia.de:4000" />

          <label for="apiKey">API-Key <span id="key-status" class="status"></span></label>
          <input
            id="apiKey"
            type="password"
            placeholder="sk-...  (leer lassen, um den gespeicherten zu behalten)"
          />

          <label for="fastModel">Modell: Text verbessern / Emojis</label>
          <input id="fastModel" placeholder="gpt-4o-mini" />

          <label for="strongModel">Modell: Dampf ablassen</label>
          <input id="strongModel" placeholder="gpt-5.5" />

          <label for="transcriptionModel">Transkriptionsmodell</label>
          <input id="transcriptionModel" placeholder="gpt-4o-transcribe" />
        </div>

        <div class="actions">
          <button type="submit">Speichern</button>
          <button type="button" id="test-btn">Verbindung testen</button>
          <span id="save-status" class="status"></span>
        </div>
        <p id="test-result" class="status"></p>
      </form>

      <hr style="margin: 24px auto; max-width: 440px; opacity: 0.2;" />

      <section class="settings">
        <h2 style="font-size: 16px;">Tastenkürzel</h2>
        <label>Diktat (halten zum Aufnehmen)</label>
        <div class="actions">
          <kbd id="hotkey-transcribe" style="padding: 4px 8px; border: 1px solid currentColor; border-radius: 6px; opacity: 0.85;"></kbd>
          <button type="button" id="hotkey-record-btn">Ändern</button>
          <button type="button" id="hotkey-reset-btn">Zurücksetzen</button>
          <span id="hotkey-status" class="status"></span>
        </div>
        <p class="status" style="margin-top: 6px;">
          Die Windows-Taste (am Mac: Cmd) wirkt wie <code>fn</code> in der Mac-App.
          Mindestens ein Zusatz-Modifier nötig.
        </p>
      </section>

      <hr style="margin: 24px auto; max-width: 440px; opacity: 0.2;" />

      <section class="settings">
        <h2 style="font-size: 16px;">Diktat testen</h2>
        <div class="actions">
          <button type="button" id="record-btn">Aufnahme starten</button>
          <span id="record-status" class="status"></span>
        </div>
        <audio id="playback" controls style="width: 100%; max-width: 440px; margin-top: 8px;"></audio>
        <p id="transcript"></p>
      </section>
    </main>
  </body>
</html>
