name: macOS Build & Release

# Builds a universal (Apple Silicon + Intel) macOS app.
# - On pull requests and pushes to main: build, verify, and upload the app as a
#   downloadable run artifact (no public release).
# - On a version tag (v*): additionally publish a GitHub Release with the app
#   attached for download.
#
# Note: this is a native macOS app (SwiftUI/AppKit, CoreML/WhisperKit, Keychain,
# Accessibility). There is no Windows build target; a Windows version would be a
# separate, cross-platform implementation.

on:
  pull_request:
    paths:
      - 'BlitztextMac/**'
      - 'build.sh'
      - 'shared/**'
      - '.github/workflows/macos-release.yml'
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    name: Build universal macOS app
    runs-on: macos-latest
    permissions:
      contents: write   # required to publish a Release on tag pushes
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build universal app (Release, ad-hoc signed)
        run: bash ./build.sh --release

      - name: Package app as zip
        run: |
          ditto -c -k --sequesterRsrc --keepParent Blitztext.app Blitztext-macos-universal.zip
          ls -lh Blitztext-macos-universal.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Blitztext-macos-universal
          path: Blitztext-macos-universal.zip
          if-no-files-found: error

      # Push to main: publish a rolling prerelease so there is always a current
      # downloadable build. The tag is created here by GITHUB_TOKEN, which on
      # purpose does NOT re-trigger this workflow, so we build and release in
      # one job rather than relying on a tag-triggered run.
      - name: Publish prerelease (push to main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v0.1.${{ github.run_number }}"
          gh release create "$TAG" \
            Blitztext-macos-universal.zip \
            --title "Blitztext $TAG" \
            --prerelease \
            --target "$GITHUB_SHA" \
            --notes "Automatic build from main (commit ${GITHUB_SHA:0:7}). Universal macOS (Apple Silicon + Intel), ad-hoc signed (not notarized). First launch: right-click the app and choose Open, or run: xattr -dr com.apple.quarantine /Applications/Blitztext.app"

      # Manual version tag (e.g. v1.0.0): publish a full, official release.
      - name: Publish release (version tag)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # The Windows job may publish the same tag's release first, so fall
          # back to uploading into the existing release.
          gh release create "$GITHUB_REF_NAME" \
            Blitztext-macos-universal.zip \
            --title "Blitztext $GITHUB_REF_NAME" \
            --notes "Universal macOS build (Apple Silicon + Intel), ad-hoc signed (not notarized). First launch: right-click the app and choose Open, or run: xattr -dr com.apple.quarantine /Applications/Blitztext.app" \
          || gh release upload "$GITHUB_REF_NAME" Blitztext-macos-universal.zip --clobber
